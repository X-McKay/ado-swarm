id: solutions_architect
name: Solutions Architect
version: 0.2.0
description: Produces bounded remediation plans from risk-classified casefiles.
entrypoint: ado_swarm.agents.solutions_architect.main:build_agent
eval_entrypoint: ado_swarm.agents.solutions_architect.eval:run_eval
capabilities:
  - solutions-architect
skill_packs:
  - triage-readonly
skills:
  - fix-plan-generation
  - remediation-strategy-selection
  - safe-change-boundary-definition
tools:
  allowed:
    - propose_remediation_strategy
  denied:
    - provider_create_draft_pr
    - git_write
risk_tier: low
outputs:
  - security_casefile
  - audit_metadata
