id: risk_auditor
name: Risk Auditor
version: 0.2.0
description: Classifies risk and automation eligibility for adjudicated security casefiles.
entrypoint: ado_swarm.agents.risk_auditor.main:build_agent
eval_entrypoint: ado_swarm.agents.risk_auditor.eval:run_eval
capabilities:
  - risk-auditor
skill_packs:
  - triage-readonly
skills:
  - security-risk-scoring
tools:
  allowed:
    - casefile_read
    - blackboard_append
  denied:
    - provider_create_draft_pr
    - git_write
risk_tier: low
outputs:
  - security_casefile
  - audit_metadata
