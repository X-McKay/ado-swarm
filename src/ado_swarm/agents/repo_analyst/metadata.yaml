id: repo_analyst
name: Repository Analyst
version: 0.2.0
description: Enriches casefiles with read-only repository and file-location evidence.
entrypoint: ado_swarm.agents.repo_analyst.main:build_agent
eval_entrypoint: ado_swarm.agents.repo_analyst.eval:run_eval
capabilities:
  - repo-analyst
skill_packs:
  - triage-readonly
skills:
  - repository-resolution
  - code-location-verification
  - git-history-investigation
tools:
  allowed:
    - resolve_repository
    - verify_file_location
    - repo_grep
    - repo_parse_manifest
  denied:
    - provider_create_draft_pr
    - git_write
risk_tier: low
outputs:
  - security_casefile
  - audit_metadata
