id: security_reviewer
name: Security Reviewer
version: 0.2.0
description: Adjudicates casefiles using repository evidence and normalized finding confidence.
entrypoint: ado_swarm.agents.security_reviewer.main:build_agent
eval_entrypoint: ado_swarm.agents.security_reviewer.eval:run_eval
capabilities:
  - security-reviewer
skill_packs:
  - triage-readonly
skills:
  - stale-finding-adjudication
tools:
  allowed:
    - casefile_read
    - blackboard_append
  denied:
    - provider_create_draft_pr
    - git_write
risk_tier: low
outputs:
  - security_casefile
  - audit_metadata
