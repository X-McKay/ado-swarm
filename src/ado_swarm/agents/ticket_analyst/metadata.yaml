id: ticket_analyst
name: Ticket Analyst
version: 0.2.0
description: Deterministically normalizes provider issues and work items into canonical security findings and casefiles.
entrypoint: ado_swarm.agents.ticket_analyst.main:build_agent
eval_entrypoint: ado_swarm.agents.ticket_analyst.eval:run_eval
capabilities:
  - ticket-normalization
  - finding-type-classification
  - scanner-finding-fingerprinting
skill_packs:
  - triage-readonly
skills:
  - security-ticket-normalization
  - finding-type-classification
  - scanner-finding-fingerprinting
tools:
  allowed:
    - normalize_finding
  denied:
    - provider_create_draft_pr
    - git_write
risk_tier: low
outputs:
  schema: SecurityCasefile
  artifact_media_type: application/json
